name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: sl-bus-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.image.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: echo "value=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.value }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: docker-compose.prod.yml
          target: ~/sl-bus-backend

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p ~/sl-bus-backend
            cd ~/sl-bus-backend

            if [ -n "${{ secrets.PROD_ENV_FILE_BASE64 }}" ]; then
              CLEAN_B64="$(printf '%s' "${{ secrets.PROD_ENV_FILE_BASE64 }}" | tr -d '\r\n\t ')"
              if ! printf '%s' "$CLEAN_B64" | base64 -d > .env; then
                echo "PROD_ENV_FILE_BASE64 is not valid base64. Re-generate with: base64 < .env | tr -d '\\n'"
                exit 1
              fi
            elif [ -n "${{ secrets.PROD_ENV_FILE }}" ]; then
              printf '%s' "${{ secrets.PROD_ENV_FILE }}" > .env
            else
              echo "Missing both PROD_ENV_FILE_BASE64 and PROD_ENV_FILE secrets."
              exit 1
            fi

            echo "DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" > .deploy.env
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"
            docker compose --env-file .deploy.env -f docker-compose.prod.yml pull
            docker compose --env-file .deploy.env -f docker-compose.prod.yml up -d
            docker image prune -f
